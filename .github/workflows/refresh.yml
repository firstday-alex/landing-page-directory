name: Refresh landing page data

on:
  schedule:
    - cron: "0 13 * * *"   # daily at 13:00 UTC (~6am PT / 9am ET)
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Write GCP service account key
        run: echo '${{ secrets.GCP_SA_KEY }}' > /tmp/sa.json

      - name: Write config.json
        run: cp config.example.json config.json

      - name: Run refresh
        env:
          SHOPIFY_ADMIN_TOKEN: ${{ secrets.SHOPIFY_ADMIN_TOKEN }}
          STOREFRONT_BASE_URL: ${{ secrets.STOREFRONT_BASE_URL }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: python refresh.py

      - name: Commit updated data
        run: |
          git config user.name "lp-directory-bot"
          git config user.email "lp-directory-bot@users.noreply.github.com"
          git add public/pages.json public/metrics.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: refresh landing page data"
            git push
          fi
